sonar.projectKey=unojobs_ui-components
sonar.projectName=@uno-jobs/components
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/__tests__/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Shared SonarQube Cloud settings for UnoJobs production repos.
# Override org via SONARQUBE_CLI_ORG when running scans.
sonar.organization=unojobs
sonar.host.url=https://sonarcloud.io

# Standard exclusions for JS/TS monorepo apps
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/coverage/**,**/.yarn/**,**/android/**,**/ios/**,**/*.min.js,**/*.bundle.js,**/graphify-out/**,**/ui-components-local/**
