# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  review_status: true

  path_instructions:
    - path: "**/*"
      instructions: >
        Shared library — breaking prop/API changes affect candidate, employer, and admin apps.
        Flag semver impact and missing peer dependency updates.
    - path: "src/**/*.{ts,tsx}"
      instructions: >
        Maintain RN web compatibility. Run lint + tsc before release tags.

  tools:
    eslint:
      enabled: true

  auto_review:
    enabled: true
    base_branches:
      - ".*"
    drafts: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0

chat:
  auto_reply: true
